apiVersion: batch/v1
kind: CronJob
metadata:
  name: trouve-guitar-finder
  namespace: default
spec:
  schedule: "0 8 * * 0"                
  timeZone: "America/New_York"          # Optional (K8s 1.27+)
  concurrencyPolicy: Forbid             # Don't overlap runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 86400        # 24h grace period for missed runs
  suspend: false
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 1800       # Kill job after 30 min
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: trouve-guitar-finder
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trouve
              image: my-registry/trouve:latest
              command: ["python", "-m", "trouve", "--headless", "-n", "95", "-q", "guitar"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              volumeMounts:
                - name: config
                  mountPath: /etc/config
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: my-config
